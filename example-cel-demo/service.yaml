apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  labels:
    app: frontend
    team: platform  # ✓ Has required labels
spec:
  type: ClusterIP  # ✓ Correct type
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: external-service
  labels:
    app: external
    team: platform
spec:
  type: LoadBalancer  # ❌ Not allowed! Only ClusterIP permitted
  selector:
    app: backend
  ports:
  - port: 443
    targetPort: 8443